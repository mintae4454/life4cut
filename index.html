<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--ink:#111;--paper:#f5f3ee;--card:#fff;--line:#e2ded4;--accent:#c8462f;--muted:#8b867c;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:var(--paper);color:var(--ink);min-height:100vh;
    padding:calc(20px + env(safe-area-inset-top)) 16px 40px;display:flex;justify-content:center;}
  .app{width:100%;max-width:820px;}
  .brand{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);}
  .brand h1{font-size:28px;font-weight:800;letter-spacing:-1px;}
  .brand span{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .tabs{display:flex;gap:4px;margin:18px 0 22px;background:var(--card);padding:4px;border-radius:12px;border:1px solid var(--line);}
  .tab{flex:1;text-align:center;padding:11px 6px;font-size:13px;font-weight:600;color:var(--muted);border-radius:9px;transition:.15s;cursor:pointer;}
  .tab.active{background:var(--ink);color:#fff;}
  .tab.done{color:var(--accent);}
  .pane{display:none;}
  .pane.active{display:block;}
  .camwrap{position:relative;background:#000;border-radius:16px;overflow:hidden;aspect-ratio:3/4;max-width:420px;margin:0 auto;}
  video,.camwrap canvas{width:100%;height:100%;object-fit:cover;display:block;}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}
  .flash.go{animation:fl .4s;}
  @keyframes fl{0%{opacity:.9}100%{opacity:0}}
  .count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:110px;font-weight:800;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;opacity:0;}
  .count.go{animation:pop 1s;}
  @keyframes pop{0%{opacity:0;transform:scale(.4)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.3)}}
  .cambar{display:flex;align-items:center;justify-content:center;gap:20px;margin:20px 0 8px;}
  .shutter{width:74px;height:74px;border-radius:50%;background:var(--accent);border:5px solid #fff;box-shadow:0 0 0 2px var(--accent),0 6px 18px rgba(0,0,0,.25);cursor:pointer;}
  .shutter:active{transform:scale(.92);}
  .iconbtn{width:52px;height:52px;border-radius:50%;background:var(--card);border:1px solid var(--line);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .startbtn{display:block;margin:14px auto 0;}
  .shots{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
  .shot{aspect-ratio:3/4;border-radius:8px;overflow:hidden;position:relative;border:3px solid transparent;cursor:pointer;background:#ddd;}
  .shot img{width:100%;height:100%;object-fit:cover;}
  .shot.sel{border-color:var(--accent);}
  .shot .num{position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;z-index:2;display:flex;align-items:center;justify-content:center;}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 10px;line-height:1.6;}
  .hint{font-size:13px;color:var(--muted);text-align:center;margin:10px 0;line-height:1.5;}
  .layout{display:grid;grid-template-columns:1fr 290px;gap:26px;}
  @media(max-width:720px){.layout{grid-template-columns:1fr;}}
  .stage{display:flex;justify-content:center;}
  .strip{background:var(--frame,#111);padding:14px 14px 52px;border-radius:4px;box-shadow:0 12px 30px rgba(0,0,0,.18);width:220px;}
  .cell{width:100%;aspect-ratio:3/4;background:#d9d5cc;margin-bottom:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .cell:last-of-type{margin-bottom:0;}
  .cell img{width:100%;height:100%;object-fit:cover;}
  .cell .ph{font-size:11px;color:#8a8577;}
  .strip .caption{text-align:center;margin-top:12px;color:var(--capcolor,#fff);font-size:13px;font-weight:600;min-height:15px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
  .card h3{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px;}
  .swatches{display:flex;gap:10px;flex-wrap:wrap;}
  .swatch{width:34px;height:34px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.15s;}
  .swatch.sel{border-color:var(--accent);transform:scale(1.08);}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .filt{padding:8px 12px;font-size:13px;font-weight:600;border-radius:20px;border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--muted);}
  .filt.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  input[type=text]{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:var(--paper);}
  input[type=text]:focus{outline:none;border-color:var(--ink);}
  .btn{width:100%;padding:14px;font-size:15px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:11px;cursor:pointer;letter-spacing:.5px;}
  .btn:active{transform:scale(.98);}
  .btn.dark{background:var(--ink);}
  .btn:disabled{background:#c9c4ba;cursor:not-allowed;}
  .tip{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5;}
  input[type=file]{display:none;}
  .install{background:#fff4ef;border:1px solid #f0c9bd;border-radius:12px;padding:12px 14px;font-size:13px;color:#8a3a28;margin-bottom:16px;line-height:1.6;}
</style>
</head>
<body>
<div class="app">
  <div class="brand"><span class="dot"></span><h1>네컷 스튜디오</h1><span>life · 4 · cut</span></div>
  <div class="install" id="installTip">앱처럼 쓰려면: 사파리 공유 버튼 → '홈 화면에 추가'를 누르세요. 홈 아이콘으로 실행하면 전체화면 앱이 돼요.</div>
  <div class="tabs">
    <div class="tab active" data-step="0">1 촬영</div>
    <div class="tab" data-step="1">2 사진 선택</div>
    <div class="tab" data-step="2">3 꾸미기</div>
  </div>
  <div class="pane active" data-pane="0">
    <div class="camwrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="flash" id="flash"></div>
      <div class="count" id="count"></div>
    </div>
    <div class="cambar">
      <button class="iconbtn" id="flipBtn" title="카메라 전환">⟳</button>
      <button class="shutter" id="shutter"></button>
      <button class="iconbtn" id="uploadBtn" title="앨범에서 추가">🖼</button>
    </div>
    <p class="hint" id="camHint">셔터를 누르면 3초 카운트 후 촬영돼요. 여러 장 찍고 다음 단계에서 4장을 고르세요.</p>
    <button class="btn dark startbtn" id="startCam" style="max-width:280px">카메라 켜기</button>
    <div class="shots" id="shotsBar"></div>
    <button class="btn" id="toSelect" style="margin-top:18px" disabled>다음 · 사진 선택 (0장 촬영됨)</button>
  </div>
  <div class="pane" data-pane="1">
    <p class="hint">넣고 싶은 순서대로 사진 4장을 탭하세요. 다시 탭하면 취소돼요.</p>
    <div class="shots" id="gallery" style="grid-template-columns:repeat(3,1fr)"></div>
    <div class="empty" id="galEmpty">아직 촬영한 사진이 없어요.<br>1단계에서 사진을 찍어주세요.</div>
    <button class="btn" id="toCompose" style="margin-top:18px" disabled>다음 · 꾸미기 (0/4)</button>
  </div>
  <div class="pane" data-pane="2">
    <div class="layout">
      <div class="stage">
        <div class="strip" id="strip">
          <div class="cell"><span class="ph">1</span></div>
          <div class="cell"><span class="ph">2</span></div>
          <div class="cell"><span class="ph">3</span></div>
          <div class="cell"><span class="ph">4</span></div>
          <div class="caption" id="cap"></div>
        </div>
      </div>
      <div class="panel">
        <div class="card"><h3>프레임 색</h3><div class="swatches" id="frameSwatches"></div></div>
        <div class="card"><h3>필터</h3><div class="filters" id="filterList"></div></div>
        <div class="card"><h3>문구</h3><input type="text" id="capText" placeholder="날짜·한마디 (예: 2026.07.09)" maxlength="24" oninput="updateCap()"></div>
        <button class="btn" id="saveBtn">이미지로 저장</button>
        <p class="tip">저장된 이미지를 길게 눌러 '사진에 저장'을 선택하세요.</p>
      </div>
    </div>
  </div>
</div>
<input type="file" id="file" accept="image/*" multiple>
<canvas id="cap-cv" style="display:none"></canvas>
<canvas id="out-cv" style="display:none"></canvas>
<script>
const state={stream:null,facing:'user',shots:[],selected:[],frame:'#111111',capColor:'#fff',caption:'',filter:'original'};
// hide install tip when running as installed PWA
if(window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches){document.getElementById('installTip').style.display='none';}
function goStep(n){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===n);t.classList.toggle('done',i<n);});
  document.querySelectorAll('.pane').forEach((p,i)=>p.classList.toggle('active',i===n));
  if(n!==0)stopCam(); if(n===1)renderGallery(); if(n===2)renderStrip();
}
document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{const n=+t.dataset.step;
  if(n===1&&state.shots.length===0)return; if(n===2&&state.selected.length<4)return; goStep(n);};});
const video=document.getElementById('video');
async function startCam(){
  try{stopCam();
    state.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:state.facing,width:{ideal:1080},height:{ideal:1440}},audio:false});
    video.srcObject=state.stream; document.getElementById('startCam').style.display='none';
  }catch(e){document.getElementById('camHint').textContent='카메라를 열 수 없어요. 사파리 카메라 권한을 허용하거나 🖼 버튼으로 앨범에서 추가하세요.';}
}
function stopCam(){if(state.stream){state.stream.getTracks().forEach(t=>t.stop());state.stream=null;}}
document.getElementById('startCam').onclick=startCam;
document.getElementById('flipBtn').onclick=()=>{state.facing=state.facing==='user'?'environment':'user';startCam();};
const countEl=document.getElementById('count'),flashEl=document.getElementById('flash');
let busy=false;
document.getElementById('shutter').onclick=async()=>{
  if(busy)return; if(!state.stream){await startCam();if(!state.stream)return;}
  busy=true;
  for(let n=3;n>=1;n--){countEl.textContent=n;countEl.classList.remove('go');void countEl.offsetWidth;countEl.classList.add('go');await new Promise(r=>setTimeout(r,1000));}
  countEl.textContent=''; flashEl.classList.remove('go');void flashEl.offsetWidth;flashEl.classList.add('go');
  capture(); busy=false;
};
function capture(){
  const cv=document.getElementById('cap-cv'),vw=video.videoWidth,vh=video.videoHeight,tr=3/4,ar=vw/vh;
  let sw,sh,sx,sy;
  if(ar>tr){sh=vh;sw=vh*tr;sx=(vw-sw)/2;sy=0;}else{sw=vw;sh=vw/tr;sx=0;sy=(vh-sh)/2;}
  cv.width=600;cv.height=800;const ctx=cv.getContext('2d');
  if(state.facing==='user'){ctx.translate(600,0);ctx.scale(-1,1);}
  ctx.drawImage(video,sx,sy,sw,sh,0,0,600,800);
  state.shots.push(cv.toDataURL('image/jpeg',0.9)); renderShotsBar();
}
document.getElementById('uploadBtn').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{[...e.target.files].forEach(f=>{const r=new FileReader();r.onload=ev=>{state.shots.push(ev.target.result);renderShotsBar();};r.readAsDataURL(f);});e.target.value='';};
function renderShotsBar(){
  const bar=document.getElementById('shotsBar');bar.innerHTML='';
  state.shots.slice(-8).forEach(src=>{const d=document.createElement('div');d.className='shot';d.innerHTML=`<img src="${src}">`;bar.appendChild(d);});
  const btn=document.getElementById('toSelect');btn.disabled=state.shots.length===0;btn.textContent=`다음 · 사진 선택 (${state.shots.length}장 촬영됨)`;
}
document.getElementById('toSelect').onclick=()=>goStep(1);
function renderGallery(){
  const g=document.getElementById('gallery');g.innerHTML='';
  document.getElementById('galEmpty').style.display=state.shots.length?'none':'block';
  state.shots.forEach((src,i)=>{const d=document.createElement('div');d.className='shot';
    const order=state.selected.indexOf(i);
    if(order>=0){d.classList.add('sel');d.innerHTML=`<div class="num">${order+1}</div>`;}
    d.innerHTML+=`<img src="${src}">`;
    d.onclick=()=>{const pos=state.selected.indexOf(i);if(pos>=0)state.selected.splice(pos,1);else if(state.selected.length<4)state.selected.push(i);renderGallery();};
    g.appendChild(d);});
  const btn=document.getElementById('toCompose');btn.disabled=state.selected.length<4;btn.textContent=`다음 · 꾸미기 (${state.selected.length}/4)`;
}
document.getElementById('toCompose').onclick=()=>{if(state.selected.length===4)goStep(2);};
const frames=[{c:'#111111',cap:'#fff'},{c:'#ffffff',cap:'#111'},{c:'#c8462f',cap:'#fff'},{c:'#2f4a6b',cap:'#fff'},{c:'#3d6b4a',cap:'#fff'},{c:'#e8c9d6',cap:'#7a3350'},{c:'#f0e2b8',cap:'#7a5c1a'},{c:'#d97757',cap:'#fff'}];
const fw=document.getElementById('frameSwatches');
frames.forEach((f,i)=>{const s=document.createElement('div');s.className='swatch'+(i===0?' sel':'');s.style.background=f.c;if(f.c==='#ffffff')s.style.borderColor='#ddd';
  s.onclick=()=>{document.querySelectorAll('#frameSwatches .swatch').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');state.frame=f.c;state.capColor=f.cap;renderStrip();};fw.appendChild(s);});
const filters=[{k:'original',n:'원본'},{k:'bw',n:'흑백'},{k:'sepia',n:'세피아'},{k:'cool',n:'쿨톤'},{k:'warm',n:'웜톤'},{k:'fade',n:'페이드'}];
const fl=document.getElementById('filterList');
filters.forEach((f,i)=>{const b=document.createElement('div');b.className='filt'+(i===0?' sel':'');b.textContent=f.n;
  b.onclick=()=>{document.querySelectorAll('.filt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');state.filter=f.k;renderStrip();};fl.appendChild(b);});
function cssFilter(){const m={bw:'grayscale(1)',sepia:'sepia(.7)',cool:'hue-rotate(-15deg) saturate(1.1)',warm:'sepia(.25) saturate(1.2)',fade:'contrast(.85) brightness(1.08) saturate(.8)'};return m[state.filter]||'none';}
function updateCap(){state.caption=document.getElementById('capText').value;document.getElementById('cap').textContent=state.caption;}
function renderStrip(){
  const strip=document.getElementById('strip');strip.style.setProperty('--frame',state.frame);strip.style.setProperty('--capcolor',state.capColor);
  const cells=strip.querySelectorAll('.cell');
  state.selected.forEach((si,i)=>{cells[i].innerHTML=`<img src="${state.shots[si]}" style="filter:${cssFilter()}">`;});
  document.getElementById('cap').textContent=state.caption;document.getElementById('cap').style.color=state.capColor;
}
document.getElementById('saveBtn').onclick=()=>{
  const W=460,pad=28,gap=16,cw=W-pad*2,ch=cw*4/3,capH=state.caption?50:24,H=pad+(ch+gap)*4-gap+capH+pad;
  const cv=document.getElementById('out-cv');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
  ctx.fillStyle=state.frame;ctx.fillRect(0,0,W,H);let done=0;
  const finish=()=>{ctx.fillStyle=state.capColor;ctx.font='600 22px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(state.caption,W/2,H-pad-6);
    const url=cv.toDataURL('image/png');const w=window.open();
    if(w)w.document.write(`<img src="${url}" style="width:100%">`);else{const a=document.createElement('a');a.href=url;a.download='네컷.png';a.click();}};
  state.selected.forEach((si,i)=>{const y=pad+i*(ch+gap);const im=new Image();
    im.onload=()=>{ctx.save();ctx.beginPath();ctx.rect(pad,y,cw,ch);ctx.clip();ctx.filter=cssFilter();
      const ar=im.width/im.height,tr=cw/ch;let dw,dh,dx,dy;
      if(ar>tr){dh=ch;dw=ch*ar;dx=pad-(dw-cw)/2;dy=y;}else{dw=cw;dh=cw/ar;dx=pad;dy=y-(dh-ch)/2;}
      ctx.drawImage(im,dx,dy,dw,dh);ctx.restore();if(++done===4)finish();};im.src=state.shots[si];});
};
</script>
</body>
</html>
